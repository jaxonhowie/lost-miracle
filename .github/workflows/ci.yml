name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  server:
    name: Server — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lost-miracle-server
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build & Test
        run: mvn -B test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-results
          path: lost-miracle-server/target/surefire-reports/
          retention-days: 7

  admin:
    name: Admin — Type-check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lost-miracle-admin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: lost-miracle-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check & Build
        run: npm run build

  client:
    name: Client — GDScript Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: GDScript syntax check
        run: |
          # Check for common GDScript issues
          echo "=== Checking scene references ==="
          for scene in $(find lost-miracle-client/scenes -name '*.gd'); do
            # Verify referenced .tscn files exist
            base=$(basename "$scene" .gd)
            dir=$(dirname "$scene")
            tscn="$dir/$base.tscn"
            if [ ! -f "$tscn" ]; then
              echo "WARNING: Missing scene file $tscn for $scene"
            fi
          done
          echo "=== Checking autoload references ==="
          grep -rn 'change_scene_to_file("res://' lost-miracle-client/scenes/ lost-miracle-client/scripts/ | head -20
          echo "=== GDScript files found ==="
          find lost-miracle-client -name '*.gd' | wc -l
          echo "scene check complete"
