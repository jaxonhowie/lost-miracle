name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  server:
    name: Server — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lost-miracle-server
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build & Test
        run: mvn -B test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-results
          path: lost-miracle-server/target/surefire-reports/
          retention-days: 7

  admin:
    name: Admin — Type-check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lost-miracle-admin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: lost-miracle-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check & Build
        run: npm run build

  client:
    name: Client — GDScript Lint & Project Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GODOT_VERSION: "4.6.2"
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot
          key: godot-${{ env.GODOT_VERSION }}

      - name: Install Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/godot
          cd ~/.local/share/godot
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" -O godot.zip
          unzip godot.zip
          chmod +x "Godot_v${GODOT_VERSION}-stable_linux.x86_64"
          ln -sf "$(pwd)/Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot

      - name: Link Godot binary
        if: steps.cache-godot.outputs.cache-hit == 'true'
        run: |
          ln -sf ~/.local/share/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot

      - name: Godot headless project validation
        run: |
          godot --headless --path lost-miracle-client --quit 2>&1 | tee /tmp/godot-output.txt
          if grep -qiE "SCRIPT ERROR|FATAL|Cannot load|Parse Error|GDScript Error" /tmp/godot-output.txt; then
            echo "::error::Godot headless check found errors"
            exit 1
          fi

      - name: GDScript file stats
        run: |
          echo "=== GDScript files ==="
          find lost-miracle-client -name '*.gd' | wc -l
          echo "=== Scene files ==="
          find lost-miracle-client -name '*.tscn' | wc -l
