server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: lost-miracle-server
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/lost_miracle?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id

lost-miracle:
  jwt:
    secret: change-me-to-a-long-random-secret-key-in-production
    expiration-seconds: 7200
  character:
    max-slots-per-user: 3
  save:
    max-bytes: 524288

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.lostmiracle: INFO
