server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: lost-miracle-server
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/lost_miracle?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${LOST_MIRACLE_DB_USER:root}
    password: ${LOST_MIRACLE_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

lost-miracle:
  jwt:
    secret: ${LOST_MIRACLE_JWT_SECRET:change-me-to-a-long-random-secret-key-in-production}
    admin-secret: ${LOST_MIRACLE_GM_JWT_SECRET:}
    expiration-seconds: 7200
  gm:
    bootstrap-super-username: ${LOST_MIRACLE_GM_USER:super}
    bootstrap-super-password: ${LOST_MIRACLE_GM_PASSWORD:gm-admin-change-me}
    expiration-seconds: 7200
    confirm-expiration-seconds: 300
  character:
    max-slots-per-user: 3
  save:
    max-bytes: 524288
  enhance:
    padding:
      threshold: 100
      bonus-rate: 0.25

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.lostmiracle: INFO
    com.lostmiracle.security.AdminJwtAuthFilter: DEBUG
